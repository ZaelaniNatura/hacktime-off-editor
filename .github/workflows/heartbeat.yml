name: Start Hackatime Off-Editor

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Choose your activity:'
        required: true
        type: choice
        options:
          - Ideation
          - Resource Creation
          - Narrative Design
          - Asset Creation
      project:
        description: 'Project Name (e.g., Jimmy: A Portfolio in Fiction):'
        required: true
        type: string
      file:
        description: 'Virtual file name:'
        required: true
        type: string
        default: 'index.html'

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Run Auto-Heartbeat
        env:
          API_KEY: ${{ secrets.HACKTIME_API_KEY }}
          CATEGORY: ${{ github.event.inputs.category }}
          PROJECT: ${{ github.event.inputs.project }}
          FILE: ${{ github.event.inputs.file }}
        run: |
          echo ") Starting session: $CATEGORY"
          echo ") 📂 Project: $PROJECT | 📄 File: $FILE"
          echo ") System will auto-heartbeat every 1 minutes."
          echo ") ⚠️ Don't forget to click 'Cancel run' when you are done working!"
          echo "---------------------------------------------------"

          while true; do
            NOW=$(date +%s.%N)
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Sending heartbeat..."
            curl -s -X POST "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                    \"entity\": \"$FILE\",
                    \"type\": \"file\",
                    \"category\": \"$CATEGORY\",
                    \"time\": $NOW,
                    \"project\": \"$PROJECT\"
                  }"
            echo ") Heartbeat sent. Sleeping for 1 minutes..."
            sleep 60
          done
