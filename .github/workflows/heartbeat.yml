name: Start Hackatime Off-Editor

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Choose your activity:'
        required: true
        type: choice
        options:
          - Ideation
          - Resource Creation
          - Narrative Design
          - Asset Creation
      project:
        description: 'Project Name (e.g., Jimmy: A Portfolio in Fiction):'
        required: true
        type: string
      file:
        description: 'Virtual file name:'
        required: true
        type: string
        default: 'index.html'

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Setup WakaTime CLI & Config File
        env:
          WAKATIME_API_KEY: ${{ secrets.HACKTIME_API_KEY }}
        run: |
          echo "Downloading official WakaTime CLI..."
          wget -q https://github.com/wakatime/wakatime-cli/releases/latest/download/wakatime-cli-linux-amd64.zip
          unzip -q wakatime-cli-linux-amd64.zip
          chmod +x wakatime-cli-linux-amd64
          
          echo "Generating ~/.wakatime.cfg file..."
          cat <<EOF > ~/.wakatime.cfg
          [settings]
          api_url = https://hackatime.hackclub.com/api/hackatime/v1
          api_key = $WAKATIME_API_KEY
          heartbeat_rate_limit_seconds = 30
          EOF

      - name: Run Auto-Heartbeat
        env:
          CATEGORY: ${{ github.event.inputs.category }}
          PROJECT: ${{ github.event.inputs.project }}
          FILE: ${{ github.event.inputs.file }}
        run: |
          echo "🚀 Starting session: $CATEGORY"
          echo "📂 Project: $PROJECT | 📄 File: $FILE"
          echo "System will auto-ping every 7 minutes."
          echo "⚠️ Don't forget to click 'Cancel run' when you are done working!"
          echo "---------------------------------------------------"
          
          while true; do
            local_time=$(date '+%Y-%m-%d %H:%M:%S')
            echo "[$local_time] Sending heartbeat to Hackatime server..."
            
            ./wakatime-cli-linux-amd64 \
              --entity "$FILE" \
              --project "$PROJECT" \
              --category "$CATEGORY" \
              --plugin "github-actions-wakatime/1.0" \
              --write
            
            echo "Heartbeat sent. Sleeping for 7 minutes..."
            sleep 420
          done
          
