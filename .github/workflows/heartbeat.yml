name: Start Hackatime Off-Editor

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Category'
        required: true
        type: choice
        options:
          - Ideation
          - Resource Creation
          - Narrative Design
          - Asset Creation
          - release prep
      project:
        description: 'Project Name'
        required: true
        type: string
      file:
        description: 'File Name'
        required: true
        type: string
        default: 'index.html'
      confirm:
        description: 'Check to confirm inputs and prevent accidental runs'
        required: true
        type: boolean
        default: false

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Execution
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "true" ]; then
            echo "Error: Execution unconfirmed. Aborting."
            exit 1
          fi

      - name: Run Auto-Heartbeat
        env:
          API_KEY: ${{ secrets.HACKTIME_API_KEY }}
          CATEGORY: ${{ github.event.inputs.category }}
          PROJECT: ${{ github.event.inputs.project }}
          FILE: ${{ github.event.inputs.file }}
        run: |
          echo "Session started: $CATEGORY"
          echo "Project: $PROJECT | File: $FILE"
          echo "Awaiting 15s delay. Cancel workflow now to abort."
          sleep 15
          
          echo "Commencing auto-heartbeat (1m intervals). Click 'Cancel run' to terminate."
          
          while true; do
            NOW=$(date +%s.%N)
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Sending heartbeat..."
            curl -s -X POST "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                    \"entity\": \"$FILE\",
                    \"type\": \"file\",
                    \"category\": \"$CATEGORY\",
                    \"time\": $NOW,
                    \"project\": \"$PROJECT\"
                  }"
            sleep 60
          done
          
