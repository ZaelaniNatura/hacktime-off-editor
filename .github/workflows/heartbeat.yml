name: Start Hackatime Off-Editor

on:
  workflow_dispatch:
    inputs:
      category:
        description: 'Category'
        required: true
        type: choice
        options:
          - Ideation
          - Research
          - Narrative Design
          - Resource Creation
          - Asset Creation
          - Game Design
          - Hardware Assembly
      project:
        description: 'Project Name'
        required: true
        type: string
      file:
        description: 'File Name'
        required: true
        type: string
      confirm:
        description: 'Double check your project and file name above, no trailing spaces or line breaks. Check this box to start.'
        required: true
        type: boolean
        default: false

jobs:
  run-heartbeat:
    runs-on: ubuntu-latest
    timeout-minutes: 85
    steps:
      - name: Verify Execution
        run: |
          if [ "${{ github.event.inputs.confirm }}" != "true" ]; then
            echo "Not confirmed, session did not start."
            exit 1
          fi

      - name: Run Auto-Heartbeat
        env:
          API_KEY: ${{ secrets.HACKTIME_API_KEY }}
          CATEGORY: ${{ github.event.inputs.category }}
          PROJECT_RAW: ${{ github.event.inputs.project }}
          FILE_RAW: ${{ github.event.inputs.file }}
        run: |
          PROJECT=$(printf '%s' "$PROJECT_RAW" | tr -d '\r\n' | sed -e 's/[[:space:]]*$//')
          FILE=$(printf '%s' "$FILE_RAW" | tr -d '\r\n' | sed -e 's/[[:space:]]*$//')

          echo "Session: $CATEGORY"
          echo "Project: $PROJECT | File: $FILE"
          echo "Give it 20 seconds. Cancel this run now if something looks off. ☕"
          sleep 20

          echo "Heartbeat running every minute. Cancel the run whenever you're done."

          SESSION_START=$(date +%s)
          MAX_SECONDS=$((80 * 60))

          while true; do
            ELAPSED=$(( $(date +%s) - SESSION_START ))
            if [ $ELAPSED -ge $MAX_SECONDS ]; then
              echo "That's 80 minutes of $CATEGORY, mate. Might be a good time to rest a bit."
              break
            fi

            NOW=$(date +%s.%N)
            echo "[$(date '+%Y-%m-%d %H:%M:%S')] Heartbeat sent."
            curl -s -X POST "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats" \
              -H "Authorization: Bearer $API_KEY" \
              -H "Content-Type: application/json" \
              -d "{
                    \"entity\": \"$FILE\",
                    \"type\": \"file\",
                    \"category\": \"$CATEGORY\",
                    \"time\": $NOW,
                    \"project\": \"$PROJECT\"
                  }"
            sleep 60
          done
