name: Delete Hackatime Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Exact Project Name to delete'
        required: true
        type: string
      date:
        description: 'Date of the heartbeats (YYYY-MM-DD) or "today"'
        required: true
        type: string
        default: 'today'
      confirm_text:
        description: 'Type "PERMANENTLY-DELETE-THIS-PROJECT" to confirm execution'
        required: true
        type: string

jobs:
  delete-heartbeats:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Execution Challenge
        run: |
          if [ "${{ github.event.inputs.confirm_text }}" != "PERMANENTLY-DELETE-THIS-PROJECT" ]; then
            echo "Error: Safety challenge failed. You must type the exact confirmation phrase."
            echo "Expected: PERMANENTLY-DELETE-THIS-PROJECT"
            echo "Provided: ${{ github.event.inputs.confirm_text }}"
            exit 1
          fi

      - name: Run Deletion Script
        env:
          API_KEY: ${{ secrets.HACKTIME_API_KEY }}
          PROJECT: ${{ github.event.inputs.project }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: |
          echo "Target Project: $PROJECT"
          
          # Resolve "today" to actual YYYY-MM-DD format
          if [ "$TARGET_DATE" = "today" ]; then
            TARGET_DATE=$(date +%Y-%m-%d)
          fi
          echo "Target Date: $TARGET_DATE"
          
          # URL-encode the project name safely using jq
          ENCODED_PROJECT=$(jq -nr --arg v "$PROJECT" '$v|@uri')
          
          echo "Fetching heartbeats from API..."
          RESPONSE=$(curl -s -X GET "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats?date=$TARGET_DATE&project=$ENCODED_PROJECT" \
            -H "Authorization: Bearer $API_KEY")
          
          # Extract heartbeat IDs from the JSON response
          IDS=$(echo "$RESPONSE" | jq -r '.data[]?.id // empty')
          
          if [ -z "$IDS" ]; then
            echo "No heartbeats found for project '$PROJECT' on $TARGET_DATE."
            exit 0
          fi
          
          COUNT=$(echo "$IDS" | wc -w)
          echo "Found $COUNT heartbeat(s). Commencing permanent deletion..."
          
          for ID in $IDS; do
            echo "Deleting ID: $ID"
            curl -s -X DELETE "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats/$ID" \
              -H "Authorization: Bearer $API_KEY"
          done
          
          echo "Deletion process completed successfully."
          
