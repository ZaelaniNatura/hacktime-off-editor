name: Delete Hackatime Project

on:
  workflow_dispatch:
    inputs:
      project:
        description: 'Exact Project Name to delete'
        required: true
        type: string
      date:
        description: 'Date of the heartbeats (YYYY-MM-DD) or "today"'
        required: true
        type: string
        default: 'today'
      confirm_text:
        description: 'Type "PERMANENTLY-DELETE-THIS-PROJECT" to confirm execution'
        required: true
        type: string

jobs:
  delete-heartbeats:
    runs-on: ubuntu-latest
    steps:
      - name: Verify Execution Challenge
        run: |
          if [ "${{ github.event.inputs.confirm_text }}" != "PERMANENTLY-DELETE-THIS-PROJECT" ]; then
            echo "Error: Safety challenge failed. You must type the exact confirmation phrase."
            exit 1
          fi

      - name: Run Deletion Script
        env:
          API_KEY: ${{ secrets.HACKTIME_API_KEY }}
          PROJECT: ${{ github.event.inputs.project }}
          TARGET_DATE: ${{ github.event.inputs.date }}
        run: |
          set -e

          if [ "$TARGET_DATE" = "today" ]; then
            TARGET_DATE=$(date +%Y-%m-%d)
          fi
          echo "Target Project: $PROJECT"
          echo "Target Date: $TARGET_DATE"

          echo "Fetching heartbeats for $TARGET_DATE..."
          HTTP_CODE=$(curl -s -o response.json -w "%{http_code}" -X GET \
            "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats?date=$TARGET_DATE" \
            -H "Authorization: Bearer $API_KEY")

          echo "HTTP Status: $HTTP_CODE"

          if ! jq empty response.json 2>/dev/null; then
            echo "Error: API did not return valid JSON. Raw response below:"
            cat response.json
            exit 1
          fi

          if [ "$HTTP_CODE" != "200" ]; then
            echo "Error: Unexpected HTTP status $HTTP_CODE"
            cat response.json
            exit 1
          fi

          # Filter heartbeats by exact project name, client-side
          # (the API has no "project" query param — it only filters by date)
          IDS_JSON=$(jq -c --arg proj "$PROJECT" '[.data[] | select(.project == $proj) | .id]' response.json)
          COUNT=$(echo "$IDS_JSON" | jq 'length')

          if [ "$COUNT" -eq 0 ]; then
            echo "No heartbeats found for project '$PROJECT' on $TARGET_DATE."
            exit 0
          fi

          echo "Found $COUNT heartbeat(s) for project '$PROJECT'. Commencing bulk deletion..."

          DELETE_BODY=$(jq -n --arg date "$TARGET_DATE" --argjson ids "$IDS_JSON" '{date: $date, ids: $ids}')

          DEL_HTTP_CODE=$(curl -s -o delete_response.json -w "%{http_code}" -X DELETE \
            "https://hackatime.hackclub.com/api/hackatime/v1/users/current/heartbeats.bulk" \
            -H "Authorization: Bearer $API_KEY" \
            -H "Content-Type: application/json" \
            -d "$DELETE_BODY")

          echo "Delete HTTP Status: $DEL_HTTP_CODE"
          cat delete_response.json

          if [ "$DEL_HTTP_CODE" != "200" ]; then
            echo "Error: Deletion request failed."
            exit 1
          fi

          echo "Deletion process completed successfully. $COUNT heartbeat(s) deleted."
